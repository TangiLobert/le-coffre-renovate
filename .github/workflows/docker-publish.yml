name: Publish Docker Image

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching version patterns (e.g., v1.0.0)
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # Docker Hub username (stored in GitHub secrets)
          password: ${{ secrets.DOCKER_PASSWORD }} # Docker Hub password (stored in GitHub secrets)

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Build and push the Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/le-coffre:latest
            ${{ secrets.DOCKER_USERNAME }}/le-coffre:${{ github.ref_name }} # Use the GitHub tag as the Docker version
